<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path as a query param so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.split('/').slice(0, 2).join('/').length) + l.search) +
        '&q=' + encodeURIComponent(l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
